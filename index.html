<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>CardScorer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Scorekeeper</p>
        <h1>CardScorer</h1>
        <p class="subtitle">Track Farkle, Canasta, Mille Bornes, and future games from one mobile-ready app.</p>
      </div>
      <button id="new-game" class="secondary">New match</button>
    </header>

    <section class="panel setup" aria-labelledby="setup-title">
      <h2 id="setup-title">Game setup</h2>
      <label>
        Game
        <select id="game-select"></select>
      </label>
      <label>
        Players or teams <span class="hint">comma separated</span>
        <input id="players-input" value="Team 1, Team 2" />
      </label>
      <button id="start-game">Start scoring</button>
    </section>

    <section id="scoreboard" class="panel hidden" aria-live="polite"></section>
    <section id="round-entry" class="panel hidden"></section>
    <section id="history" class="panel hidden"></section>
  </main>
  <script type="module" src="src/app.js"></script>
</body>
</html>
